version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: api-monitoring-postgres
    environment:
      POSTGRES_DB: api_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api-monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: api-monitoring-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-utk_redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - api-monitoring-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: api-monitoring-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: api_user
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-utk_rabbitmq_password}
      RABBITMQ_DEFAULT_VHOST: api_monitoring
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - api-monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: api-monitoring-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - api-monitoring-network
    restart: unless-stopped
    depends_on:
      - postgres

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: api-monitoring-consumer
    environment:
      NODE_ENV: production
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: api_monitoring
      PG_USER: postgres
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      DATABASE_URL: postgresql://postgres:${PG_PASSWORD:-postgres}@postgres:5432/api_monitoring?schema=public
      RABBITMQ_URL: amqp://api_user:${RABBITMQ_PASSWORD:-utk_rabbitmq_password}@rabbitmq:5672/api_monitoring
      RABBITMQ_QUEUE: api_hits
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-utk_redis_password}
      REDIS_URL: redis://:${REDIS_PASSWORD:-utk_redis_password}@redis:6379
    volumes:
      - ./logs:/app/logs
    networks:
      - api-monitoring-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  api-monitoring-network:
    driver: bridge
